<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Telegram Канал</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      text-align: center;
    }

    .container {
      max-width: 400px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .logo {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 20px;
      border: 3px solid #38bdf8;
    }

    h1 {
      margin: 10px 0;
      font-size: 26px;
    }

    p {
      color: #cbd5f5;
      font-size: 16px;
      margin-bottom: 25px;
    }

    .preview {
      width: 100%;
      border-radius: 15px;
      margin-bottom: 25px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    .btn {
      display: inline-block;
      padding: 15px 25px;
      font-size: 18px;
      color: white;
      background: #38bdf8;
      border-radius: 10px;
      text-decoration: none;
      transition: 0.3s;
    }

    .btn:hover {
      background: #0ea5e9;
      transform: scale(1.05);
    }

    .footer {
      margin-top: 40px;
      font-size: 12px;
      color: #64748b;
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- Логотип -->
    <img src="ALTYNlogo.png" alt="Логотип канала" class="logo">

    <!-- Название -->
    <h1>Твой Telegram канал</h1>

    <!-- Описание -->
    <p>ТОП-1 АНАЛИТИКА</p>

    <!-- Кнопка -->
    <a href="https://t.me/+JQi0l9C24cNiYmZi" class="btn" target="_blank">
      Подписаться
    </a>

    <div class="footer">
      © 2026 Все права защищены
    </div>

  </div>

</body>
</html>
